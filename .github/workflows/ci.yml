name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The prepare script runs tsc + vite build; skip it during install and run build
      # explicitly below so a build failure is reported as its own step.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck (server)
        run: pnpm typecheck

      - name: Typecheck (tests)
        run: pnpm typecheck:test

      - name: Test (offline; network is mocked)
        run: pnpm test

      - name: Build (server + web)
        run: pnpm build
